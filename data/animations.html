<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOCK - 动画展示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <pre class="logo">
   _    _       _ _           _
  / \  | |_ __ (_) |__  _   _(_)_ __
 / _ \ | | '_ \| | '_ \| | | | | '_ \
/ ___ \| | | | | | |_) | |_| | | | | |
/_/   \_\_|_| |_|_|_.__/ \__,_|_|_| |_|
            </pre>
            <h1>动画展示</h1>
            <p class="subtitle">点击按钮在数码管上播放动画</p>
        </header>

        <div class="anim-grid">
            <button class="btn btn-large btn-anim" data-type="0">[ ☀️ Sunshine ]</button>
            <button class="btn btn-large btn-anim" data-type="1">[ 🌧️ Raining  ]</button>
            <button class="btn btn-large btn-anim" data-type="2">[ ❤️ Love      ]</button>
            <button class="btn btn-large btn-anim" data-type="3">[ 😊 Smile     ]</button>
            <button class="btn btn-large btn-anim" data-type="4">[ 😢 Sad       ]</button>
            <button class="btn btn-large btn-anim" data-type="5">[ 😐 Nol       ]</button>
        </div>

        <div id="status" class="status-panel" style="display:none;">
            <div class="status-row">
                <span id="statusMsg" class="value">动画已触发</span>
            </div>
        </div>

        <footer>
            <a href="index.html" class="btn btn-sm">[ 返回主页 ]</a>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        document.querySelectorAll('.btn-anim').forEach(btn => {
            btn.addEventListener('click', async () => {
                const type = parseInt(btn.dataset.type);
                const status = document.getElementById('status');
                const msg = document.getElementById('statusMsg');
                try {
                    await fetchJson('/api/display/animation', 'POST', { type });
                    status.style.display = 'block';
                    msg.textContent = '✅ ' + btn.textContent.trim() + ' 已触发';
                    msg.style.color = 'var(--text-body)';
                } catch (e) {
                    status.style.display = 'block';
                    msg.textContent = '❌ 请求失败: ' + e.message;
                    msg.style.color = '#CC0000';
                }
                setTimeout(() => { status.style.display = 'none'; }, 3000);
            });
        });
    </script>
</body>
</html>
