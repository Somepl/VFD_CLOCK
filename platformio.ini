; PlatformIO Project Configuration File
; ESP32 数码管时钟 — 采用 loop() + millis() 非阻塞架构

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; ===== 库依赖 =====
lib_deps =
    https://github.com/simonttp78/ESPAsyncWebServer.git   ; 异步Web服务器（配网页面）
    bblanchon/ArduinoJson @ ^6.21.3                          ; JSON解析（天气API + 网页API，与现有代码兼容）
    simsso/ShiftRegister74HC595 @ ^1.3.1                     ; 74HC595 数码管驱动
    adafruit/RTClib @ ^2.1.4                                 ; DS3231 RTC 驱动
    esphome/AsyncTCP-esphome @ ^2.0.0                        ; AsyncTCP（ESPAsyncWebServer 依赖）
    knolleary/PubSubClient @ ^2.8                   ; MQTT 客户端（远程控制）

; ===== 16MB Flash 配置 =====
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_upload.maximum_size = 16777216      ; 显式指定最大flash大小
board_build.partitions = partitions/default_16MB.csv
board_build.filesystem = littlefs

; ===== 串口 & OTA =====
monitor_speed = 115200
upload_speed = 921600
extra_scripts = pre:esptool_cfg.py

; ===== 编译参数 =====
build_flags =
    -D CORE_DEBUG_LEVEL=0    ; 0=无调试, 4=详细（调试WiFi/Web问题时改为4）
    -D MQTT_MAX_PACKET_SIZE=4096   ; MQTT 最大包大小，支持图案/动画列表传输
