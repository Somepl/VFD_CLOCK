<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOCK - 动画编辑</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .editor-panel { background: var(--bg-panel); border: 2px solid var(--border-panel); padding: 16px; margin-bottom: 12px; }
        .editor-panel h2 { font-size: 14px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--heading-underline); }
        .frame-list { margin: 8px 0; }
        .frame-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-bottom: 1px solid var(--border-list); font-size: 13px; }
        .frame-item .idx { color: var(--text-muted); font-size: 10px; width: 20px; }
        .frame-item .hex { font-family: monospace; font-size: 10px; color: var(--text-muted); flex: 1; }
        .frame-item input[type="number"] { width: 60px; font-family: monospace; font-size: 12px; border: 2px solid var(--border-input); padding: 2px 4px; background: var(--bg-input); color: var(--text-body); }
        .frame-item .btn-sm { font-size: 10px; padding: 2px 6px; }
        .add-frame-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .add-frame-row select { flex: 1; font-family: monospace; font-size: 12px; border: 2px solid var(--border-input); padding: 4px; background: var(--bg-input); color: var(--text-body); }
        .saved-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-bottom: 1px solid var(--border-list); font-size: 13px; }
        .saved-item .name { flex: 1; }
        .saved-item .count { font-size: 10px; color: var(--text-muted); }
        .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <pre class="logo">
    _    _       _ _           _
   / \  | |_ __ (_) |__  _   _(_)_ __
  / _ \ | | '_ \| | '_ \| | | | | '_ \
 / ___ \| | | | | | |_) | |_| | | | | |
/_/   \_\_|_| |_|_|_.__/ \__,_|_|_| |_|
            </pre>
            <h1>动画编辑</h1>
            <p class="subtitle">组合图案并设置时间间隔</p>
        </header>

        <div class="editor-panel">
            <h2>帧序列</h2>
            <div id="frameList" class="frame-list">
                <div class="frame-item" style="color:var(--text-btn-disabled);">暂无帧，从下方添加</div>
            </div>
            <div class="add-frame-row">
                <select id="patternSelect"><option value="">-- 选择图案 --</option></select>
                <input type="number" id="frameDuration" value="500" min="50" max="10000" style="width:70px;">
                <span style="font-size:11px;color:var(--text-muted);">ms</span>
                <button class="btn btn-sm" onclick="addFrame()">[ 添加 ]</button>
            </div>
            <div style="margin-top:12px; display:flex; gap:8px;">
                <input type="text" id="animName" class="input" placeholder="动画名称" style="flex:1;">
                <button class="btn" onclick="saveAnim()">[ 保存 ]</button>
                <button class="btn btn-primary" onclick="playAnim()">[ ▶ 播放 ]</button>
            </div>
        </div>

        <div class="editor-panel">
            <h2>已保存动画</h2>
            <div id="savedList" class="saved-list"></div>
        </div>

        <footer>
            <a href="index.html" class="btn btn-sm">[ 返回主页 ]</a>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        let frames = [];

        async function loadPatterns() {
            try {
                const list = await fetchJson('/api/patterns');
                const sel = document.getElementById('patternSelect');
                sel.innerHTML = '<option value="">-- 选择图案 --</option>';
                (list || []).forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name + ' [' + p.data.map(v => v.toString(16).toUpperCase().padStart(2,'0')).join(' ') + ']';
                    opt.dataset.data = JSON.stringify(p.data);
                    sel.appendChild(opt);
                });
            } catch(e) {}
        }

        function addFrame() {
            const sel = document.getElementById('patternSelect');
            if (!sel.value) { alert('请选择一个图案'); return; }
            const opt = sel.options[sel.selectedIndex];
            const data = JSON.parse(opt.dataset.data);
            const duration = parseInt(document.getElementById('frameDuration').value) || 500;
            frames.push({ data, duration });
            renderFrames();
        }

        function removeFrame(idx) {
            frames.splice(idx, 1);
            renderFrames();
        }

        function moveFrame(idx, dir) {
            const to = idx + dir;
            if (to < 0 || to >= frames.length) return;
            [frames[idx], frames[to]] = [frames[to], frames[idx]];
            renderFrames();
        }

        function renderFrames() {
            const container = document.getElementById('frameList');
            if (frames.length === 0) {
                container.innerHTML = '<div class="frame-item" style="color:var(--text-btn-disabled);">暂无帧，从下方添加</div>';
                return;
            }
            container.innerHTML = '';
            frames.forEach((f, i) => {
                const div = document.createElement('div');
                div.className = 'frame-item';
                const hex = f.data.map(v => v.toString(16).toUpperCase().padStart(2,'0')).join(' ');
                div.innerHTML = `
                    <span class="idx">#${i+1}</span>
                    <span class="hex">${hex}</span>
                    <input type="number" class="dur-input" value="${f.duration}" min="50" max="10000" data-idx="${i}">
                    <span style="font-size:10px;color:var(--text-muted);">ms</span>
                    <button class="btn btn-sm" onclick="moveFrame(${i},-1)">[ ▲ ]</button>
                    <button class="btn btn-sm" onclick="moveFrame(${i},1)">[ ▼ ]</button>
                    <button class="btn btn-sm" onclick="removeFrame(${i})">[ ✕ ]</button>
                `;
                container.appendChild(div);
            });
            container.querySelectorAll('.dur-input').forEach(inp => {
                inp.addEventListener('change', function() {
                    const idx = parseInt(this.dataset.idx);
                    frames[idx].duration = parseInt(this.value) || 500;
                });
            });
        }

        async function saveAnim() {
            const name = document.getElementById('animName').value.trim();
            if (!name) { alert('请输入动画名称'); return; }
            if (frames.length === 0) { alert('至少添加一帧'); return; }
            const animFrames = frames.map(f => ({ data: f.data, duration: f.duration }));
            try {
                await fetchJson('/api/animations', 'POST', { name, frames: animFrames });
                document.getElementById('animName').value = '';
                frames = [];
                renderFrames();
                loadSavedAnims();
            } catch(e) { alert('保存失败: ' + e.message); }
        }

        async function playAnim() {
            if (frames.length === 0) { alert('至少添加一帧'); return; }
            const animFrames = frames.map(f => ({ data: f.data, duration: f.duration }));
            try {
                await fetchJson('/api/display/anim-play', 'POST', { frames: animFrames });
            } catch(e) { alert('播放失败: ' + e.message); }
        }

        async function deleteAnim(id) {
            try {
                await fetchJson('/api/animations', 'DELETE', { id });
                loadSavedAnims();
            } catch(e) { alert('删除失败: ' + e.message); }
        }

        async function playSavedAnim(id) {
            try {
                const list = await fetchJson('/api/animations');
                const a = list.find(x => x.id === id);
                if (a) await fetchJson('/api/display/anim-play', 'POST', { frames: a.frames });
            } catch(e) {}
        }

        async function loadAnim(id) {
            try {
                const list = await fetchJson('/api/animations');
                const a = list.find(x => x.id === id);
                if (a) {
                    frames = a.frames.map(f => ({ data: [...f.data], duration: f.duration }));
                    renderFrames();
                }
            } catch(e) {}
        }

        async function loadSavedAnims() {
            try {
                const list = await fetchJson('/api/animations');
                const container = document.getElementById('savedList');
                container.innerHTML = '';
                if (!list || list.length === 0) {
                    container.innerHTML = '<div class="saved-item" style="color:var(--text-btn-disabled);">暂无保存的动画</div>';
                    return;
                }
                list.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'saved-item';
                    div.innerHTML = `
                        <span class="name">${a.name}</span>
                        <span class="count">${a.frames.length}帧</span>
                        <div>
                            <button class="btn btn-sm" onclick="loadAnim(${a.id})">[ 编辑 ]</button>
                            <button class="btn btn-sm" onclick="playSavedAnim(${a.id})">[ ▶ ]</button>
                            <button class="btn btn-sm" onclick="deleteAnim(${a.id})">[ 删除 ]</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) {}
        }

        loadPatterns();
        loadSavedAnims();
    </script>
</body>
</html>
